<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="'Pretendard','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#1b263b"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6b4a"/>
      <stop offset="1" stop-color="#d63f2a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <!-- floating code glyphs -->
  <g fill="#3ddc84" opacity="0.25" font-family="monospace" font-size="22">
    <text x="60"  y="60">{ }</text><text x="1080" y="80">&lt;/&gt;</text>
    <text x="960" y="240">##</text><text x="150" y="250">$_</text>
    <text x="1130" y="180">()=&gt;</text><text x="40" y="160">::</text>
  </g>

  <!-- crayfish mascot -->
  <g transform="translate(180,150)">
    <!-- antennae -->
    <path d="M18,-52 Q40,-95 88,-108" stroke="#ff8a6a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M-18,-52 Q-40,-95 -88,-108" stroke="#ff8a6a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- left claw -->
    <g transform="translate(-78,10) rotate(-18)">
      <ellipse cx="0" cy="0" rx="34" ry="24" fill="url(#shell)"/>
      <path d="M-26,-14 Q-56,-30 -50,-2 Q-46,16 -22,12 Z" fill="url(#shell)"/>
    </g>
    <!-- right claw -->
    <g transform="translate(78,10) rotate(18)">
      <ellipse cx="0" cy="0" rx="34" ry="24" fill="url(#shell)"/>
      <path d="M26,-14 Q56,-30 50,-2 Q46,16 22,12 Z" fill="url(#shell)"/>
    </g>
    <!-- tail -->
    <g fill="#d63f2a">
      <ellipse cx="0" cy="86" rx="34" ry="14"/>
      <ellipse cx="0" cy="72" rx="40" ry="15" fill="#e8492f"/>
    </g>
    <!-- body -->
    <ellipse cx="0" cy="8" rx="52" ry="62" fill="url(#shell)"/>
    <ellipse cx="0" cy="-6" rx="46" ry="40" fill="#ff7a55"/>
    <!-- legs -->
    <g stroke="#d63f2a" stroke-width="7" stroke-linecap="round">
      <line x1="-46" y1="42" x2="-72" y2="60"/><line x1="46" y1="42" x2="72" y2="60"/>
      <line x1="-50" y1="26" x2="-78" y2="36"/><line x1="50" y1="26" x2="78" y2="36"/>
    </g>
    <!-- glasses + eyes -->
    <g>
      <circle cx="-17" cy="-24" r="15" fill="#fff" stroke="#243044" stroke-width="4"/>
      <circle cx="17"  cy="-24" r="15" fill="#fff" stroke="#243044" stroke-width="4"/>
      <line x1="-2" y1="-24" x2="2" y2="-24" stroke="#243044" stroke-width="4"/>
      <circle cx="-14" cy="-22" r="6" fill="#1b263b"/>
      <circle cx="20"  cy="-22" r="6" fill="#1b263b"/>
      <circle cx="-12" cy="-24" r="2" fill="#fff"/>
      <circle cx="22"  cy="-24" r="2" fill="#fff"/>
    </g>
    <!-- smile -->
    <path d="M-12,2 Q0,12 12,2" stroke="#7a1f12" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- laptop -->
    <g transform="translate(0,52)">
      <rect x="-42" y="-2" width="84" height="10" rx="3" fill="#8d99ae"/>
      <rect x="-36" y="-30" width="72" height="30" rx="4" fill="#2b3a55" stroke="#8d99ae" stroke-width="2"/>
      <text x="-26" y="-9" font-family="monospace" font-size="12" fill="#3ddc84">&gt; /mlbo_</text>
    </g>
  </g>

  <!-- title -->
  <g fill="#ffffff">
    <text x="360" y="118" font-size="46" font-weight="800">GJC 멀티벤더 오케스트레이션</text>
    <text x="360" y="168" font-size="24" fill="#aebfd0">가재코드(Gajae Code) 역할별 모델 배치 — 비표준 환경 적응 가이드</text>
    <g font-size="19" fill="#3ddc84" font-family="monospace">
      <text x="360" y="222">$ gjc --mpreset daily-adapted</text>
      <text x="360" y="252">&gt; /mlbo coding-sprint-adapted   # 세션 안에서 모드 전환</text>
    </g>
  </g>
</svg>
